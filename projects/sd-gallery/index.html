<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SD Gallery</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f13; color: #e2e8f0; font-family: system-ui, sans-serif; }

    header { padding: 1em 1.5em; border-bottom: 1px solid #1e293b; display: flex; align-items: center; gap: 0.8em; }
    header h1 { font-size: 1em; color: #60a5fa; font-weight: 600; flex: 1; }
    .back-btn { background: none; border: 1px solid #334155; border-radius: 6px; color: #94a3b8; padding: 0.3em 0.8em; cursor: pointer; font-size: 0.8em; display: none; }
    .back-btn:hover { border-color: #60a5fa; color: #60a5fa; }
    .char-select { background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #94a3b8; padding: 0.3em 0.6em; font-size: 0.8em; cursor: pointer; }
    .char-select:hover { border-color: #60a5fa; }

    .tabs { display: flex; border-bottom: 1px solid #1e293b; }
    .tab { padding: 0.7em 1.5em; font-size: 0.82em; cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
    .tab:hover { color: #94a3b8; }

    /* calendar */
    #calendar-view { padding: 1.2em 1.5em; }
    .cal-nav { display: flex; align-items: center; gap: 1em; margin-bottom: 1em; }
    .cal-nav button { background: none; border: 1px solid #334155; border-radius: 6px; color: #94a3b8; padding: 0.3em 0.7em; cursor: pointer; font-size: 0.85em; }
    .cal-nav button:hover { border-color: #60a5fa; color: #60a5fa; }
    .cal-nav h2 { font-size: 0.95em; color: #e2e8f0; font-weight: 600; min-width: 120px; text-align: center; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.4em; }
    .cal-weekday { text-align: center; font-size: 0.7em; color: #475569; padding: 0.3em 0; }
    .cal-day { border-radius: 8px; overflow: hidden; background: #1e293b; border: 1px solid #1e293b; min-height: 80px; cursor: default; transition: border-color 0.15s; }
    .cal-day.has-images { cursor: pointer; border-color: #334155; }
    .cal-day.has-images:hover { border-color: #60a5fa; }
    .cal-day.today { border-color: #3b82f6; }
    .cal-day.other-month .day-num { color: #334155; }
    .cal-day .day-num { font-size: 0.72em; color: #64748b; padding: 0.35em 0.5em; }
    .cal-day .thumb { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .cal-day .count { font-size: 0.65em; color: #475569; padding: 0.2em 0.5em 0.3em; }

    /* diary page (date → scene list) */
    #diary-view { display: none; padding: 1.2em 1.5em; }
    .diary-date-title { font-size: 1em; font-weight: 600; color: #e2e8f0; margin-bottom: 0.8em; }
    .diary-text-box { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 0.8em 1em; margin-bottom: 1.2em; min-height: 60px; }
    .diary-text-box p { font-size: 0.82em; color: #94a3b8; line-height: 1.7; white-space: pre-wrap; }
    .diary-text-box.empty p { color: #475569; font-style: italic; }
    .diary-scenes-title { font-size: 0.72em; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.7em; }
    .scene-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.7em; }
    .scene-card { cursor: pointer; border-radius: 10px; overflow: hidden; background: #1e293b; border: 1px solid #1e293b; transition: all 0.15s; }
    .scene-card:hover { border-color: #60a5fa; transform: translateY(-2px); }
    .scene-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; background: #0f172a; }
    .scene-card .label { padding: 0.45em 0.65em; }
    .scene-card .label .name { font-size: 0.8em; font-weight: 600; }
    .scene-card .label .sub { font-size: 0.66em; color: #64748b; margin-top: 0.1em; }

    /* scene images page */
    #scene-images-view { display: none; padding: 1.2em 1.5em; }
    .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.6em; }
    .img-item { position: relative; border-radius: 8px; overflow: hidden; cursor: pointer; background: #1e293b; }
    .img-item img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; transition: transform 0.15s; }
    .img-item:hover img { transform: scale(1.03); }
    .img-item .num { position: absolute; top: 0.4em; left: 0.5em; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 0.1em 0.4em; font-size: 0.65em; color: #94a3b8; }

    /* scenes tab */
    #scene-list-view { display: none; padding: 1.2em 1.5em; }
    #scene-detail-view { display: none; padding: 1.2em 1.5em; }
    .all-scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.8em; }
    .prompt-box { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 0.8em 1em; margin-bottom: 1em; }
    .prompt-box h3 { font-size: 0.7em; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.4em; }
    .prompt-box p { font-size: 0.73em; color: #94a3b8; line-height: 1.6; word-break: break-word; }
    .view-title { font-size: 1em; font-weight: 600; margin-bottom: 0.8em; }

    /* lightbox */
    #lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; align-items: center; justify-content: center; }
    #lb.show { display: flex; }
    #lb img { max-width: 90vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    #lb-close { position: fixed; top: 1em; right: 1.5em; font-size: 2em; cursor: pointer; color: #64748b; }
    #lb-close:hover { color: #e2e8f0; }
    .loading { padding: 3em 2em; text-align: center; color: #64748b; font-size: 0.85em; }
  </style>
</head>
<body>
  <header>
    <button class="back-btn" id="back-btn" onclick="handleBack()">← 戻る</button>
    <h1 id="header-title">🖤 くろえの日記</h1>
    <select class="char-select" id="char-select" onchange="switchCharacter(this.value)"></select>
  </header>

  <div class="tabs" id="tabs">
    <div class="tab active" id="tab-calendar" onclick="switchTab('calendar')">日記</div>
    <div class="tab" id="tab-scenes" onclick="switchTab('scenes')">シーン別</div>
  </div>

  <div id="calendar-view">
    <div class="cal-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <h2 id="cal-month-label"></h2>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-weekdays"></div>
    <div class="cal-grid" id="cal-days"></div>
  </div>

  <!-- diary page: text + scene cards -->
  <div id="diary-view">
    <p class="diary-date-title" id="diary-date-title"></p>
    <div class="diary-text-box" id="diary-text-box">
      <p id="diary-text"></p>
    </div>
    <p class="diary-scenes-title">シーン</p>
    <div class="scene-list" id="diary-scene-list"><p class="loading">読み込み中...</p></div>
  </div>

  <!-- scene images: grid of generated images for that date+scene -->
  <div id="scene-images-view">
    <div class="prompt-box" id="scene-images-prompt-box" style="display:none"><h3>Prompt</h3><p id="scene-images-prompt"></p></div>
    <div class="image-grid" id="scene-image-grid"></div>
  </div>

  <!-- scenes tab: all scenes list -->
  <div id="scene-list-view">
    <div class="all-scene-grid" id="all-scene-grid"><p class="loading">読み込み中...</p></div>
  </div>

  <!-- scene detail: prompt + all images -->
  <div id="scene-detail-view">
    <p class="view-title" id="scene-detail-title"></p>
    <div class="prompt-box">
      <h3>Prompt</h3>
      <p id="scene-detail-prompt"></p>
    </div>
    <div class="image-grid" id="scene-detail-grid"></div>
  </div>

  <div id="lb"><span id="lb-close">×</span><img id="lb-img" src="" alt=""></div>

  <script>
    let currentTab = 'calendar';
    let calYear = new Date().getFullYear();
    let calMonth = new Date().getMonth() + 1;
    let calData = {};
    let allScenes = [];
    let currentDate = null;
    let currentCharacter = 'chloe';
    let characters = [];

    const WEEKDAYS = ['日','月','火','水','木','金','土'];
    const VIEWS = ['calendar-view','diary-view','scene-images-view','scene-list-view','scene-detail-view'];

    function showOnly(id) {
      for (const v of VIEWS) document.getElementById(v).style.display = v === id ? 'block' : 'none';
    }

    function apiUrl(path) {
      const sep = path.includes('?') ? '&' : '?';
      return `${path}${sep}character=${currentCharacter}`;
    }

    async function loadCharacters() {
      const res = await fetch('/api/characters');
      characters = await res.json();
      const sel = document.getElementById('char-select');
      sel.innerHTML = characters.map(c =>
        `<option value="${c.slug}" ${c.slug === currentCharacter ? 'selected' : ''}>${c.name}</option>`
      ).join('');
      sel.style.display = characters.length <= 1 ? 'none' : '';
      updateHeaderTitle();
    }

    function updateHeaderTitle() {
      const char = characters.find(c => c.slug === currentCharacter);
      const name = char?.name ?? currentCharacter;
      document.getElementById('header-title').textContent = `🖤 ${name}の日記`;
      document.title = `SD Gallery — ${name}`;
    }

    function switchCharacter(slug) {
      currentCharacter = slug;
      allScenes = [];
      updateHeaderTitle();
      loadCalendar();
      if (currentTab === 'scenes') loadAllScenes();
    }

    // ── History API ──────────────────────────────────────────────
    function navigate(state, url) {
      history.pushState(state, '', url);
      applyState(state, false);
    }

    function applyState(state, isPopstate = false) {
      const s = state ?? { view: 'calendar' };
      const tab = s.tab ?? (s.view === 'scene-list' || s.view === 'scene-detail' ? 'scenes' : 'calendar');
      document.getElementById('tab-calendar').classList.toggle('active', tab === 'calendar');
      document.getElementById('tab-scenes').classList.toggle('active', tab === 'scenes');

      const hasTabs = s.view === 'calendar' || s.view === 'scene-list';
      document.getElementById('tabs').style.display = hasTabs ? '' : 'none';
      document.getElementById('back-btn').style.display = hasTabs ? 'none' : 'inline-block';

      if (s.character) currentCharacter = s.character;

      if (s.view === 'calendar') {
        updateHeaderTitle();
        showOnly('calendar-view');
      } else if (s.view === 'diary') {
        const [y, m, d] = s.date.split('-');
        document.getElementById('header-title').textContent = `${y}年${parseInt(m)}月${parseInt(d)}日`;
        showOnly('diary-view');
        if (isPopstate) _renderDiary(s.date);
      } else if (s.view === 'scene-images') {
        document.getElementById('header-title').textContent = s.name;
        showOnly('scene-images-view');
        if (isPopstate) _renderSceneImages(s.date, s.slug);
      } else if (s.view === 'scene-list') {
        updateHeaderTitle();
        document.getElementById('header-title').textContent = document.getElementById('header-title').textContent.replace('の日記', 'のシーン別');
        showOnly('scene-list-view');
        if (!allScenes.length) loadAllScenes();
      } else if (s.view === 'scene-detail') {
        document.getElementById('header-title').textContent = s.name;
        showOnly('scene-detail-view');
        if (isPopstate) _renderSceneDetail(s.slug);
      }
    }

    window.addEventListener('popstate', e => applyState(e.state, true));

    function switchTab(tab) {
      currentTab = tab;
      if (tab === 'calendar') navigate({ view: 'calendar', tab, character: currentCharacter }, '/');
      else navigate({ view: 'scene-list', tab: 'scenes', character: currentCharacter }, '/?tab=scenes');
    }

    function handleBack() { history.back(); }

    // calendar
    async function loadCalendar() {
      const res = await fetch(apiUrl(`/api/calendar?year=${calYear}&month=${calMonth}`));
      const rows = await res.json();
      calData = {};
      for (const r of rows) calData[r.diary_date] = r;
      renderCalendar();
    }

    function renderCalendar() {
      document.getElementById('cal-month-label').textContent = `${calYear}年 ${calMonth}月`;
      document.getElementById('cal-weekdays').innerHTML = WEEKDAYS.map(d => `<div class="cal-weekday">${d}</div>`).join('');

      const first = new Date(calYear, calMonth - 1, 1);
      const lastDay = new Date(calYear, calMonth, 0).getDate();
      const startDow = first.getDay();
      const today = new Date().toISOString().slice(0, 10);

      const cells = [];
      const prevLast = new Date(calYear, calMonth - 1, 0).getDate();
      for (let i = startDow - 1; i >= 0; i--) cells.push({ day: prevLast - i, otherMonth: true });
      for (let d = 1; d <= lastDay; d++) cells.push({ day: d, otherMonth: false });
      while (cells.length % 7 !== 0) cells.push({ day: cells.length - (startDow + lastDay) + 1, otherMonth: true });

      document.getElementById('cal-days').innerHTML = cells.map(c => {
        const dateStr = c.otherMonth ? null : `${calYear}-${String(calMonth).padStart(2,'0')}-${String(c.day).padStart(2,'0')}`;
        const entry = dateStr ? calData[dateStr] : null;
        const isToday = dateStr === today;
        const cls = ['cal-day', c.otherMonth ? 'other-month' : '', entry ? 'has-images' : '', isToday ? 'today' : ''].filter(Boolean).join(' ');
        const onclick = entry ? `onclick="showDiary('${dateStr}')"` : '';
        const thumb = entry ? `<img class="thumb" src="/serve/${entry.thumb_id}" loading="lazy">` : '';
        const count = entry ? `<div class="count">${entry.count}枚</div>` : '';
        return `<div class="${cls}" ${onclick}><div class="day-num">${c.day}</div>${thumb}${count}</div>`;
      }).join('');
    }

    function changeMonth(delta) {
      calMonth += delta;
      if (calMonth > 12) { calMonth = 1; calYear++; }
      if (calMonth < 1)  { calMonth = 12; calYear--; }
      loadCalendar();
    }

    // diary page
    async function showDiary(date) {
      currentDate = date;
      navigate({ view: 'diary', date, character: currentCharacter }, `/diary/${date}`);
      await _renderDiary(date);
    }

    async function _renderDiary(date) {
      const [y, m, d] = date.split('-');
      document.getElementById('diary-date-title').textContent = `${y}年${parseInt(m)}月${parseInt(d)}日`;
      document.getElementById('diary-text').textContent = '読み込み中...';
      document.getElementById('diary-scene-list').innerHTML = '<p class="loading">読み込み中...</p>';
      const res = await fetch(apiUrl(`/api/dates/${date}`));
      const data = await res.json();
      const textEl = document.getElementById('diary-text');
      const boxEl = document.getElementById('diary-text-box');
      if (data.entry?.text) { textEl.textContent = data.entry.text; boxEl.classList.remove('empty'); }
      else { textEl.textContent = 'この日の日記はまだありません'; boxEl.classList.add('empty'); }
      if (!data.scenes.length) { document.getElementById('diary-scene-list').innerHTML = '<p class="loading">画像なし</p>'; return; }
      document.getElementById('diary-scene-list').innerHTML = data.scenes.map(s => `
        <div class="scene-card" onclick="showSceneImages('${date}', '${s.slug}', '${s.name}')">
          ${s.thumb_id ? `<img src="/serve/${s.thumb_id}" loading="lazy" alt="${s.name}">` : `<div style="aspect-ratio:2/3;background:#0f172a;display:flex;align-items:center;justify-content:center;color:#334155;font-size:0.75em;">no image</div>`}
          <div class="label"><div class="name">${s.name}</div><div class="sub">${s.image_count}枚</div></div>
        </div>
      `).join('');
    }

    // scene images for a specific date
    async function showSceneImages(date, slug, name) {
      navigate({ view: 'scene-images', date, slug, name, character: currentCharacter }, `/diary/${date}/scenes/${slug}`);
      document.getElementById('scene-image-grid').innerHTML = '<p class="loading">読み込み中...</p>';
      document.getElementById('scene-images-prompt-box').style.display = 'none';
      document.getElementById('scene-images-prompt').textContent = '';
      await _renderSceneImages(date, slug);
    }

    async function _renderSceneImages(date, slug) {
      const res = await fetch(apiUrl(`/api/dates/${date}/scenes/${slug}/images`));
      const images = await res.json();
      if (!images.length) {
        document.getElementById('scene-image-grid').innerHTML = '<p class="loading">画像なし</p>';
        return;
      }
      const firstPrompt = images.find(img => img.prompt)?.prompt;
      if (firstPrompt) {
        document.getElementById('scene-images-prompt').textContent = firstPrompt;
        document.getElementById('scene-images-prompt-box').style.display = 'block';
      }
      document.getElementById('scene-image-grid').innerHTML = images.map((img, i) => `
        <div class="img-item" onclick="openLb('/serve/${img.id}')">
          <img src="/serve/${img.id}" loading="lazy" alt="">
          <span class="num">${String(i+1).padStart(2,'0')}</span>
        </div>
      `).join('');
    }

    // scenes tab
    async function loadAllScenes() {
      const res = await fetch(apiUrl('/api/scenes'));
      allScenes = await res.json();
      const grid = document.getElementById('all-scene-grid');
      if (!allScenes.length) { grid.innerHTML = '<p class="loading">シーンなし</p>'; return; }
      grid.innerHTML = allScenes.map(s => `
        <div class="scene-card" onclick="showSceneDetail('${s.slug}')">
          ${s.image_count > 0
            ? `<img src="${apiUrl('/thumb/' + s.slug)}" loading="lazy" alt="${s.name}">`
            : `<div style="aspect-ratio:2/3;background:#0f172a;display:flex;align-items:center;justify-content:center;color:#334155;font-size:0.75em;">no image</div>`}
          <div class="label">
            <div class="name">${s.name}</div>
            <div class="sub">${s.image_count}枚</div>
          </div>
        </div>
      `).join('');
    }

    async function showSceneDetail(slug) {
      const scene = allScenes.find(s => s.slug === slug);
      if (!scene) return;
      navigate({ view: 'scene-detail', slug, name: scene.name, tab: 'scenes', character: currentCharacter }, `/scenes/${slug}`);
      document.getElementById('scene-detail-title').textContent = scene.name;
      document.getElementById('scene-detail-prompt').textContent = scene.prompt;
      document.getElementById('scene-detail-grid').innerHTML = '<p class="loading">読み込み中...</p>';
      await _renderSceneDetail(slug);
    }

    async function _renderSceneDetail(slug) {
      if (!allScenes.length) { const r = await fetch(apiUrl('/api/scenes')); allScenes = await r.json(); }
      const scene = allScenes.find(s => s.slug === slug);
      if (scene) { document.getElementById('scene-detail-title').textContent = scene.name; document.getElementById('scene-detail-prompt').textContent = scene.prompt; }
      const res = await fetch(apiUrl(`/api/scenes/${slug}/images`));
      const images = await res.json();
      if (!images.length) { document.getElementById('scene-detail-grid').innerHTML = '<p class="loading">画像なし</p>'; return; }
      document.getElementById('scene-detail-grid').innerHTML = images.map((img, i) => `
        <div class="img-item" onclick="openLb('/serve/${img.id}')">
          <img src="/serve/${img.id}" loading="lazy" alt="">
          <span class="num">${String(i+1).padStart(2,'0')}</span>
        </div>
      `).join('');
    }

    // lightbox
    function openLb(src) { document.getElementById('lb-img').src = src; document.getElementById('lb').classList.add('show'); }
    document.getElementById('lb-close').onclick = () => document.getElementById('lb').classList.remove('show');
    document.getElementById('lb').onclick = (e) => { if (e.target === e.currentTarget) document.getElementById('lb').classList.remove('show'); };
    document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('lb').classList.remove('show'); });

    // init: restore from URL or default to calendar
    (async function init() {
      await loadCharacters();
      const path = location.pathname;
      let initState = { view: 'calendar', character: currentCharacter };
      const diaryScene = path.match(/^\/diary\/(\d{4}-\d{2}-\d{2})\/scenes\/(.+)$/);
      const diary = path.match(/^\/diary\/(\d{4}-\d{2}-\d{2})$/);
      const scene = path.match(/^\/scenes\/(.+)$/);
      const tab = new URLSearchParams(location.search).get('tab');
      if (diaryScene) initState = { view: 'scene-images', date: diaryScene[1], slug: diaryScene[2], name: diaryScene[2], character: currentCharacter };
      else if (diary) initState = { view: 'diary', date: diary[1], character: currentCharacter };
      else if (scene) initState = { view: 'scene-detail', slug: scene[1], name: scene[1], tab: 'scenes', character: currentCharacter };
      else if (tab === 'scenes') initState = { view: 'scene-list', tab: 'scenes', character: currentCharacter };
      history.replaceState(initState, '', location.href);
      applyState(initState, true);
      loadCalendar();
    })();
  </script>
</body>
</html>
